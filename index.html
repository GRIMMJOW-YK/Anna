<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Anna · Cinematic Whispers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0c0a1a 0%, #02010a 100%);
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      color: #f3eefe;
      scroll-behavior: smooth;
    }

    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap');

    /* ========== BACKGROUND PARTICLES & FLOATING ORBS ========== */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      background: rgba(255, 200, 220, 0.4);
      border-radius: 50%;
      filter: blur(2px);
      animation: floatParticle 12s infinite linear;
    }
    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0.6); opacity: 0; }
      30% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }
    .glow-orb {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,77,109,0.2), rgba(199,125,255,0.05), transparent);
      border-radius: 50%;
      filter: blur(60px);
      animation: orbMove 20s infinite alternate;
    }
    @keyframes orbMove {
      0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
      100% { transform: translate(10%, 15%) scale(1.3); opacity: 0.8; }
    }

    /* PASSWORD LOCK SCREEN */
    .lock-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 2, 15, 0.92);
      backdrop-filter: blur(12px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.9s ease, visibility 0s;
      visibility: visible;
    }
    .lock-card {
      background: rgba(25, 18, 45, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 56px;
      padding: 2.2rem 1.8rem;
      width: 86%;
      max-width: 380px;
      text-align: center;
      border: 1px solid rgba(255, 125, 160, 0.5);
      box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255,77,109,0.2);
    }
    .lock-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      background: linear-gradient(135deg, #ffb7d0, #d9b0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }
    .lock-input {
      width: 100%;
      background: rgba(40, 28, 70, 0.7);
      border: 1.5px solid #ff4d6d;
      border-radius: 60px;
      padding: 14px 20px;
      margin: 24px 0;
      color: #fff0f5;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: all 0.3s;
    }
    .lock-input:focus {
      border-color: #c77dff;
      box-shadow: 0 0 18px #ff4d6d;
    }
    .lock-btn {
      background: linear-gradient(115deg, #ff4d6d, #c77dff);
      border: none;
      padding: 14px 20px;
      width: 100%;
      border-radius: 60px;
      font-weight: 600;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .lock-btn:active { transform: scale(0.97); }
    .hint-text {
      font-size: 0.75rem;
      margin-top: 15px;
      color: #cdb5ff;
    }
    .error-msg {
      color: #ffa5bb;
      font-size: 0.8rem;
      margin-top: 12px;
      min-height: 38px;
    }

    /* MAIN STORY CONTAINER */
    .story-container {
      position: relative;
      z-index: 10;
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.2s ease;
    }
    .story-container.visible {
      opacity: 1;
      visibility: visible;
    }

    /* scene blocks */
    .scene {
      margin-bottom: 3rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .scene.revealed {
      opacity: 1;
      transform: translateY(0);
    }
    .typing-text {
      font-size: 1.6rem;
      font-weight: 500;
      background: linear-gradient(125deg, #ffc0d0, #e1b5ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.4;
      letter-spacing: -0.2px;
      border-right: 2px solid #ff7b9e;
      white-space: normal;
      display: inline-block;
    }
    .chat-container {
      background: rgba(20, 15, 38, 0.45);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      padding: 1.2rem;
      margin: 1rem 0;
    }
    .message {
      display: flex;
      margin-bottom: 12px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.4s ease;
    }
    .message.show {
      opacity: 1;
      transform: translateX(0);
    }
    .bubble-wa {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 22px;
      font-size: 0.95rem;
      background: rgba(50, 40, 80, 0.7);
      backdrop-filter: blur(8px);
      color: #f0eaff;
      border: 0.5px solid rgba(255, 125, 160, 0.4);
    }
    .message.incoming .bubble-wa {
      background: rgba(30, 22, 60, 0.8);
      border-bottom-left-radius: 6px;
    }
    .message.outgoing {
      justify-content: flex-end;
    }
    .message.outgoing .bubble-wa {
      background: linear-gradient(145deg, #ff4d6d30, #c77dff30);
      border-bottom-right-radius: 6px;
    }
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 10px 15px;
      background: rgba(40, 30, 70, 0.6);
      width: fit-content;
      border-radius: 26px;
      margin: 6px 0;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #ff9ebf;
      border-radius: 50%;
      animation: blinkTyping 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blinkTyping {
      0%, 100% { opacity: 0.3; transform: scale(1);}
      50% { opacity: 1; transform: scale(1.2);}
    }

    .scroll-text {
      font-size: 1.1rem;
      font-weight: 400;
      line-height: 1.7;
      background: rgba(15,10,30,0.4);
      backdrop-filter: blur(8px);
      padding: 1.2rem;
      border-radius: 32px;
      margin: 1.2rem 0;
      border-left: 3px solid #ff7b9e;
    }

    /* HEARTBEAT CINEMATIC MOMENT */
    .heartbeat-moment {
      text-align: center;
      margin: 2.5rem 0;
      padding: 1.8rem;
      background: rgba(0,0,0,0.4);
      border-radius: 60px;
      backdrop-filter: blur(12px);
    }
    .cinematic-line {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 600;
      color: #ffd9e8;
      text-shadow: 0 0 12px #ff4d6d;
      letter-spacing: 1px;
      line-height: 1.3;
    }
    .heartbeat-glow {
      animation: heartbeatPulse 1.3s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes heartbeatPulse {
      0% { text-shadow: 0 0 0px #ff4d6d, transform: scale(1);}
      50% { text-shadow: 0 0 25px #ff4d6d, 0 0 12px #c77dff; transform: scale(1.02);}
      100% { text-shadow: 0 0 5px #ff4d6d; transform: scale(1);}
    }
    .step-line {
      margin: 0.6rem 0;
      opacity: 0;
      transform: scale(0.95);
      transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }
    .step-line.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* Final button */
    .final-btn {
      background: linear-gradient(115deg, #ff5c7e, #c76eff);
      border: none;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      margin: 20px auto;
      display: block;
      cursor: pointer;
      box-shadow: 0 0 20px #ff4d6d;
      transition: 0.2s;
    }
    .final-btn:active { transform: scale(0.96); }
    .floating-hearts-area {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .small-heart {
      font-size: 1.4rem;
      animation: flyHeart 1s ease-out forwards;
    }
    @keyframes flyHeart {
      0% { opacity: 0; transform: translateY(0) scale(0.5);}
      50% { opacity: 1; transform: translateY(-30px) scale(1.2);}
      100% { opacity: 0; transform: translateY(-80px) scale(0.8);}
    }
    .soft-ending {
      text-align: center;
      font-size: 1rem;
      color: #cfbef5;
      margin-top: 2rem;
    }

    /* Sound toggle */
    .sound-toggle {
      position: fixed;
      bottom: 22px;
      right: 22px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 300;
      font-size: 1.3rem;
      border: 1px solid rgba(255,77,109,0.5);
    }

    @media (max-width: 550px) {
      .typing-text { font-size: 1.3rem; }
      .cinematic-line { font-size: 1.5rem; }
      .step-line { font-size: 1rem; }
      .story-container { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="particles" id="particlesContainer"></div>
<div class="glow-orb" style="top: -10%; left: -10%;"></div>
<div class="glow-orb" style="bottom: -20%; right: -10%; animation-duration: 25s;"></div>

<!-- PASSWORD LOCK -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <h2>✦ only for you ✦</h2>
    <input type="password" class="lock-input" id="passwordInput" placeholder="Enter something special..." autocomplete="off">
    <div class="hint-text">You already know the answer… 🙂</div>
    <button class="lock-btn" id="unlockBtn">unlock →</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<!-- MAIN STORY CONTAINER -->
<div class="story-container" id="storyContainer">
  <!-- Scene 1: Beginning hook -->
  <div class="scene" id="scene1">
    <div class="typing-text" id="hookTyping"></div>
  </div>

  <!-- Scene 2: WhatsApp style chat -->
  <div class="scene" id="scene2">
    <div class="chat-container" id="chatContainer"></div>
  </div>

  <!-- Scene 3: Emotional build scrolling text -->
  <div class="scene" id="scene3">
    <div class="scroll-text" id="emotionalScroll"></div>
  </div>

  <!-- MAIN CINEMATIC MOMENT (Heart) -->
  <div class="heartbeat-moment" id="heartbeatScene">
    <div id="cinematicLinesContainer"></div>
  </div>

  <!-- Soft ending lines -->
  <div class="soft-ending" id="softEnding">
    <p>No pressure…</p>
    <p>No expectations…</p>
    <p>Just something real… if it ever happens.</p>
  </div>

  <!-- Final button + hearts -->
  <button class="final-btn" id="finalSmileBtn" style="display: none;">👉 Just smile… that’s enough for me 😊</button>
  <div id="heartAnimationArea" class="floating-hearts-area"></div>
</div>

<div class="sound-toggle" id="soundToggle">🔊</div>

<script>
  // ---------- AUDIO ----------
  const audio = new Audio('https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8c6c2c0.mp3?filename=soft-piano-ambient-112027.mp3');
  audio.loop = true;
  audio.volume = 0.15;
  let musicStarted = false;
  let muted = false;
  const soundToggle = document.getElementById('soundToggle');
  function startMusic() {
    if (!musicStarted) {
      audio.play().catch(e => console.log("autoplay blocked, gesture needed"));
      musicStarted = true;
    }
  }
  soundToggle.addEventListener('click', () => {
    if (musicStarted) {
      muted = !muted;
      audio.volume = muted ? 0 : 0.15;
      soundToggle.innerHTML = muted ? '🔇' : '🔊';
    }
  });

  // ---------- PARTICLES ----------
  function createParticles() {
    const container = document.getElementById('particlesContainer');
    for (let i = 0; i < 140; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      const size = Math.random() * 4 + 1;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 12 + 's';
      p.style.animationDuration = 6 + Math.random() * 12 + 's';
      p.style.opacity = 0.2 + Math.random() * 0.5;
      container.appendChild(p);
    }
  }
  createParticles();

  // ---------- PASSWORD CHECK ----------
  const lockScreen = document.getElementById('lockScreen');
  const passwordInput = document.getElementById('passwordInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const errorMsg = document.getElementById('errorMsg');
  const storyContainer = document.getElementById('storyContainer');

  function checkAndUnlock() {
    const pwd = passwordInput.value.trim();
    if (pwd.toUpperCase() === "ANNA") {
      errorMsg.innerHTML = "";
      startMusic();
      // cinematic transition
      lockScreen.style.opacity = '0';
      setTimeout(() => {
        lockScreen.style.display = 'none';
        storyContainer.classList.add('visible');
        // start entire story sequence
        startStorySequence();
      }, 800);
    } else {
      errorMsg.innerHTML = "Hmm… that doesn’t feel right 💔";
      passwordInput.style.borderColor = "#ff6b8f";
      setTimeout(() => { passwordInput.style.borderColor = "#ff4d6d"; }, 500);
    }
  }
  unlockBtn.addEventListener('click', checkAndUnlock);
  passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAndUnlock(); });

  // ---------- STORY SEQUENCE (delays + realistic chat) ----------
  async function startStorySequence() {
    // Scene 1: hook typing effect
    const hookEl = document.getElementById('hookTyping');
    const hookText = "I didn’t expect this…\n…but somehow, you became someone I look forward to.";
    hookEl.style.whiteSpace = "pre-line";
    await typeText(hookEl, hookText, 60);
    document.getElementById('scene1').classList.add('revealed');
    
    // slight delay before scene2
    await delay(800);
    document.getElementById('scene2').classList.add('revealed');
    await simulateWhatsAppChat();
    
    await delay(700);
    document.getElementById('scene3').classList.add('revealed');
    await showScrollText();
    
    await delay(800);
    await showHeartbeatCinematic();
    
    // final button appears after all
    document.getElementById('finalSmileBtn').style.display = 'block';
    document.getElementById('softEnding').style.opacity = '1';
    document.getElementById('softEnding').style.transition = 'opacity 1s';
  }

  function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

  async function typeText(element, text, speed) {
    element.innerHTML = '';
    for (let i = 0; i <= text.length; i++) {
      element.innerHTML = text.substring(0, i) + (i < text.length ? '|' : '');
      await delay(speed);
    }
    element.innerHTML = text;
  }

  async function simulateWhatsAppChat() {
    const chatContainer = document.getElementById('chatContainer');
    chatContainer.innerHTML = '';
    const messages = [
      { type: 'incoming', text: "We’re not even that close…", delay: 400 },
      { type: 'outgoing', text: "But still… I feel comfortable talking to you", delay: 900 },
      { type: 'incoming', text: "It’s different… in a good way", delay: 1100 }
    ];
    // show typing indicator first
    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    typingDiv.innerHTML = '<span></span><span></span><span></span>';
    chatContainer.appendChild(typingDiv);
    await delay(1200);
    typingDiv.remove();
    
    for (let msg of messages) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${msg.type}`;
      msgDiv.innerHTML = `<div class="bubble-wa">${msg.text}</div>`;
      chatContainer.appendChild(msgDiv);
      await delay(200);
      msgDiv.classList.add('show');
      await delay(msg.delay);
    }
  }

  async function showScrollText() {
    const scrollDiv = document.getElementById('emotionalScroll');
    const lines = [
      "I’m not trying to rush anything…",
      "Not expecting anything from you…",
      "I just… like being here."
    ];
    scrollDiv.innerHTML = '';
    for (let line of lines) {
      const p = document.createElement('p');
      p.textContent = line;
      p.style.margin = '1rem 0';
      p.style.opacity = '0';
      p.style.transform = 'translateY(12px)';
      p.style.transition = 'all 0.5s ease';
      scrollDiv.appendChild(p);
      await delay(300);
      p.style.opacity = '1';
      p.style.transform = 'translateY(0)';
      await delay(600);
    }
  }

  async function showHeartbeatCinematic() {
    const container = document.getElementById('cinematicLinesContainer');
    container.innerHTML = '';
    const steps = [
      "I will wait…",
      "even if it takes a year…",
      "until the day…",
      "you can say ‘I love you’ to me."
    ];
    for (let i = 0; i < steps.length; i++) {
      const div = document.createElement('div');
      div.className = 'step-line cinematic-line';
      div.innerHTML = steps[i];
      if (i === steps.length - 1) div.classList.add('heartbeat-glow');
      container.appendChild(div);
      await delay(300);
      div.classList.add('visible');
      if (i === 0) await delay(800);
      else if (i === 1) await delay(700);
      else if (i === 2) await delay(700);
      else await delay(500);
    }
    // final heartbeat effect continues
    const lastDiv = container.lastChild;
    if (lastDiv) lastDiv.style.animation = 'heartbeatPulse 1.3s ease-in-out infinite';
  }

  // Final button interaction: hearts floating, no pressure
  const finalBtn = document.getElementById('finalSmileBtn');
  const heartArea = document.getElementById('heartAnimationArea');
  finalBtn.addEventListener('click', () => {
    // create 20 floating hearts
    for (let i = 0; i < 24; i++) {
      const heartSpan = document.createElement('span');
      heartSpan.className = 'small-heart';
      heartSpan.innerHTML = ['❤️', '💖', '🌸', '✨', '💗'][Math.floor(Math.random() * 5)];
      heartSpan.style.position = 'relative';
      heartSpan.style.display = 'inline-block';
      heartSpan.style.margin = '0 6px';
      heartSpan.style.animation = `flyHeart 1.2s ease-out forwards`;
      heartSpan.style.animationDelay = `${i * 0.05}s`;
      heartArea.appendChild(heartSpan);
      setTimeout(() => heartSpan.remove(), 1300);
    }
    // soft fade-out effect not needed, just appreciation
    const finalMessage = document.createElement('div');
    finalMessage.style.textAlign = 'center';
    finalMessage.style.marginTop = '20px';
    finalMessage.style.fontSize = '0.9rem';
    finalMessage.style.color = '#ffccdd';
    finalMessage.innerHTML = '✨ you made my day ✨';
    heartArea.parentNode.appendChild(finalMessage);
    setTimeout(() => finalMessage.style.opacity = '0', 2500);
  });

  // preload styles for scenes to be hidden initially
  window.addEventListener('load', () => {
    document.getElementById('scene1').style.opacity = '0';
    document.getElementById('scene2').style.opacity = '0';
    document.getElementById('scene3').style.opacity = '0';
    document.getElementById('heartbeatScene').style.opacity = '0';
    document.getElementById('softEnding').style.opacity = '0';
    // make heartbeat scene visible later via class
    const scenes = document.querySelectorAll('.scene, .heartbeat-moment');
    scenes.forEach(scene => scene.style.opacity = '0');
    // re-assign after reveal class
    const observer = new MutationObserver(() => {
      document.getElementById('scene1').classList.contains('revealed') ? document.getElementById('scene1').style.opacity = '1' : null;
      document.getElementById('scene2').classList.contains('revealed') ? document.getElementById('scene2').style.opacity = '1' : null;
      document.getElementById('scene3').classList.contains('revealed') ? document.getElementById('scene3').style.opacity = '1' : null;
    });
    observer.observe(document.getElementById('scene1'), { attributes: true });
    observer.observe(document.getElementById('scene2'), { attributes: true });
    observer.observe(document.getElementById('scene3'), { attributes: true });
  });

  // adjust heartbeat scene visibility
  const heartbeatSceneDiv = document.getElementById('heartbeatScene');
  const originalShow = showHeartbeatCinematic;
  window.showHeartbeatCinematic = async function() {
    heartbeatSceneDiv.style.opacity = '1';
    await originalShow();
  };
  showHeartbeatCinematic = window.showHeartbeatCinematic;

  // fix final display: ensure soft ending appears properly
  document.getElementById('softEnding').style.transition = 'opacity 0.8s';
  
  // additional background parallax effect on scroll
  window.addEventListener('scroll', () => {
    const scrolled = window.scrollY;
    const orbs = document.querySelectorAll('.glow-orb');
    orbs.forEach((orb, idx) => {
      orb.style.transform = `translate(${scrolled * 0.02 * (idx+1)}px, ${scrolled * 0.01}px)`;
    });
  });
</script>
</body>
</html>
