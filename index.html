<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>fragments of us | a quiet film</title>
    <!-- Fonts: Playfair Display + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #080b14;
            overflow-x: hidden;
            min-height: 100vh;
            color: #f2ede8;
            transition: background 1.2s ease;
        }

        /* moving light gradient background */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(70, 40, 90, 0.55), rgba(8, 12, 22, 0.92)),
                        repeating-linear-gradient(125deg, rgba(255, 190, 170, 0.02) 0px, rgba(255, 190, 170, 0.02) 3px, transparent 3px, transparent 12px);
            animation: slowDrift 22s infinite alternate;
            z-index: -2;
            pointer-events: none;
        }

        @keyframes slowDrift {
            0% { background-position: 0% 0%; filter: hue-rotate(0deg) brightness(1); }
            100% { background-position: 12% 8%; filter: hue-rotate(6deg) brightness(1.02); }
        }

        /* particle canvas (floating) */
        #particleCanvas, #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        #starCanvas { z-index: 12; }

        /* password gate glassmorphism */
        .password-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(18px);
            background: rgba(5, 5, 15, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 1.1s ease, transform 1s ease;
        }

        .glass-card {
            background: rgba(20, 22, 38, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            width: 86%;
            max-width: 380px;
            border: 1px solid rgba(255, 230, 210, 0.2);
            box-shadow: 0 30px 45px rgba(0,0,0,0.4);
            text-align: center;
        }

        .glass-card input {
            width: 100%;
            background: rgba(12, 14, 28, 0.8);
            border: 1px solid rgba(255, 200, 170, 0.5);
            padding: 14px 18px;
            border-radius: 50px;
            font-family: 'Poppins', monospace;
            font-size: 1rem;
            color: #fff2e6;
            text-align: center;
            letter-spacing: 1px;
            transition: 0.2s;
        }

        .glass-card input:focus {
            outline: none;
            border-color: #ffbc9a;
            box-shadow: 0 0 14px rgba(255, 150, 110, 0.4);
        }

        .glass-card button {
            margin-top: 22px;
            background: rgba(255, 235, 220, 0.12);
            border: 1px solid rgba(255, 210, 180, 0.6);
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 500;
            color: #ffe8dd;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: 0.25s;
            width: 100%;
        }

        .glass-card button:hover {
            background: rgba(255, 190, 150, 0.3);
            letter-spacing: 0.8px;
        }

        /* main experience container */
        .experience {
            opacity: 0;
            transform: scale(0.97);
            transition: opacity 1.2s cubic-bezier(0.2, 0.9, 0.3, 1.2), transform 1.1s ease;
            max-width: 780px;
            margin: 0 auto;
            padding: 2rem 1.2rem 5rem;
            position: relative;
            z-index: 20;
        }

        .experience.active {
            opacity: 1;
            transform: scale(1);
        }

        /* scenes styling */
        .scene-block {
            margin-bottom: 3.5rem;
        }

        /* typing scene */
        .typing-container {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 500;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255, 210, 170, 0.4);
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .typed-line {
            white-space: pre-wrap;
        }
        .cursor-blink {
            display: inline-block;
            width: 2px;
            background-color: #ffd2b5;
            margin-left: 3px;
            animation: blinkCursor 1s infinite;
        }
        @keyframes blinkCursor { 0%,100%{ opacity: 1; } 50%{ opacity: 0; } }

        /* WhatsApp chat style */
        .whatsapp-container {
            background: #0f121e;
            border-radius: 32px;
            padding: 20px 16px;
            border: 1px solid rgba(255, 200, 170, 0.12);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
        }
        .message {
            max-width: 86%;
            padding: 10px 16px;
            border-radius: 22px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            font-weight: 400;
            width: fit-content;
            animation: messagePop 0.35s ease;
            background: #1e253b;
            border-bottom-left-radius: 6px;
        }
        .message.left {
            background: #1e253b;
            margin-right: auto;
        }
        @keyframes messagePop {
            0% { opacity: 0; transform: translateY(10px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .vibrate-message {
            animation: gentleShake 0.2s ease-in-out 0s 1;
        }
        @keyframes gentleShake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(2px); }
            75% { transform: translateX(-2px); }
            100% { transform: translateX(0); }
        }
        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 10px 18px;
            background: #1e253b;
            width: fit-content;
            border-radius: 28px;
            margin-bottom: 12px;
        }
        .dot {
            width: 7px;
            height: 7px;
            background: #bbbcd8;
            border-radius: 50%;
            animation: bounceDot 1.3s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounceDot { 0%,60%,100%{ transform: translateY(0); opacity: 0.6; } 30%{ transform: translateY(-6px); opacity: 1; } }

        /* inner feelings cinematic text */
        .cinematic-text {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 2rem 1.5rem;
            text-align: center;
            font-size: 1.4rem;
            font-family: 'Playfair Display', serif;
        }
        .feel-line {
            opacity: 0;
            transform: translateY(28px);
            animation: fadeUp 0.8s forwards;
            margin: 1.1rem 0;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* masterpiece moment */
        .masterpiece-area {
            text-align: center;
            padding: 2rem 1rem;
            background: radial-gradient(ellipse 70% 50% at center, rgba(45, 28, 70, 0.65), transparent);
            border-radius: 56px;
            margin: 1rem 0;
        }
        .master-line {
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            margin: 1rem 0;
            opacity: 0;
            transform: scale(0.96);
            animation: zoomFade 0.7s forwards;
            text-shadow: 0 0 5px rgba(255, 180, 140, 0.6);
        }
        @keyframes zoomFade {
            to { opacity: 1; transform: scale(1); }
        }
        .heart-glow {
            animation: subtleHeart 2s infinite ease;
        }
        @keyframes subtleHeart {
            0% { text-shadow: 0 0 0px rgba(255, 130, 100, 0);}
            50% { text-shadow: 0 0 16px rgba(255, 150, 120, 0.8);}
            100% { text-shadow: 0 0 0px rgba(255, 130, 100, 0);}
        }

        .soft-ending-box {
            text-align: center;
            font-style: italic;
            background: rgba(255, 210, 190, 0.05);
            border-radius: 48px;
            padding: 2rem;
            margin: 2rem 0;
        }
        .final-button {
            background: rgba(255, 225, 200, 0.15);
            border: 1px solid rgba(255, 180, 140, 0.6);
            padding: 14px 28px;
            border-radius: 60px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            color: #ffe6d9;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s;
            margin: 1rem auto;
            display: inline-block;
        }
        .final-button:hover {
            background: rgba(255, 180, 140, 0.35);
            transform: scale(1.02);
        }

        /* camera zoom effect */
        .camera-zoom {
            animation: gentleCamZoom 18s infinite alternate ease-in-out;
        }
        @keyframes gentleCamZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }
        /* responsive */
        @media (max-width: 620px) {
            .typing-container { font-size: 1.5rem; }
            .master-line { font-size: 1.35rem; }
            .cinematic-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<canvas id="particleCanvas"></canvas>
<canvas id="starCanvas"></canvas>

<!-- PASSWORD GATE -->
<div id="passwordGate" class="password-gate">
    <div class="glass-card">
        <h2 style="font-family: Playfair Display; font-weight: 500; margin-bottom: 1.4rem;">✧ 静谧的门 ✧</h2>
        <input type="password" id="pwdInput" placeholder="Enter something special…" autocomplete="off">
        <button id="unlockButton">unlock →</button>
        <p style="font-size: 0.7rem; margin-top: 1rem; opacity: 0.55;">a quiet film · no pressure</p>
    </div>
</div>

<!-- MAIN CINEMATIC EXPERIENCE -->
<div id="experience" class="experience">
    <div id="storyRoot"></div>
    <div id="extraButtonZone" style="text-align: center;"></div>
</div>

<script>
    (function(){
        // DOM elements
        const gate = document.getElementById('passwordGate');
        const expContainer = document.getElementById('experience');
        const storyRoot = document.getElementById('storyRoot');
        const finalBtnZone = document.getElementById('extraButtonZone');
        
        let musicStarted = false;
        let audioPlayer = null;
        let soundCtx = null; // for optional notification beep
        let storySequence = [];
        let currentStep = 0;
        let isUnlocked = false;
        
        // ---------- Particles (floating) ----------
        const particleCanvas = document.getElementById('particleCanvas');
        let pCtx = particleCanvas.getContext('2d');
        let particles = [];
        
        function resizeParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticles);
        resizeParticles();
        
        class Particle {
            constructor() {
                this.x = Math.random() * particleCanvas.width;
                this.y = Math.random() * particleCanvas.height;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.15;
                this.speedY = (Math.random() - 0.5) * 0.08;
                this.alpha = Math.random() * 0.45 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = particleCanvas.width;
                if (this.x > particleCanvas.width) this.x = 0;
                if (this.y < 0) this.y = particleCanvas.height;
                if (this.y > particleCanvas.height) this.y = 0;
            }
            draw() {
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                pCtx.fillStyle = `rgba(255, 210, 180, ${this.alpha * 0.7})`;
                pCtx.fill();
            }
        }
        function initParticles() {
            particles = [];
            for(let i=0;i<110;i++) particles.push(new Particle());
        }
        function animateParticles() {
            if(!pCtx) return;
            pCtx.clearRect(0,0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        animateParticles();
        
        // ---------- STARS: ANNA in stars (bonus) ----------
        const starCanvas = document.getElementById('starCanvas');
        let sCtx = starCanvas.getContext('2d');
        let starAnimId = null;
        function resizeStars() { starCanvas.width = window.innerWidth; starCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeStars);
        resizeStars();
        
        function drawAnnaStars() {
            sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
            const w = starCanvas.width, h = starCanvas.height;
            const points = [];
            // Design ANNA constellation pattern (relative dots)
            const pattern = [
                // A
                {x: 0, y:0}, {x: 0, y:1}, {x: 0, y:2}, {x: 1, y:1}, {x: 2, y:0}, {x: 2, y:1}, {x: 2, y:2}, {x: 3, y:0}, {x: 3, y:2}, {x: 4, y:0}, {x: 4, y:2},
                // N
                {x: 6, y:0}, {x: 6, y:1}, {x: 6, y:2}, {x: 7, y:1}, {x: 8, y:0}, {x: 8, y:1}, {x: 8, y:2}, {x: 9, y:1}, {x: 10, y:0}, {x: 10, y:1}, {x: 10, y:2},
                // N (second)
                {x: 12, y:0}, {x: 12, y:1}, {x: 12, y:2}, {x: 13, y:1}, {x: 14, y:0}, {x: 14, y:1}, {x: 14, y:2}, {x: 15, y:1}, {x: 16, y:0}, {x: 16, y:1}, {x: 16, y:2},
                // A
                {x: 18, y:0}, {x: 18, y:1}, {x: 18, y:2}, {x: 19, y:1}, {x: 20, y:0}, {x: 20, y:1}, {x: 20, y:2}, {x: 21, y:0}, {x: 21, y:2}, {x: 22, y:0}, {x: 22, y:2}
            ];
            const startX = w/2 - 150;
            const startY = h/2 - 35;
            const step = 10;
            pattern.forEach(p => {
                const xPos = startX + p.x * step;
                const yPos = startY + p.y * step;
                points.push({x: xPos, y: yPos, size: 2.2 + Math.random()*1.2});
            });
            let startTime = Date.now();
            function twinkleStars() {
                sCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
                const elapsed = Date.now() - startTime;
                if(elapsed > 5000) {
                    if(starAnimId) cancelAnimationFrame(starAnimId);
                    sCtx.clearRect(0,0,starCanvas.width,starCanvas.height);
                    return;
                }
                points.forEach(pt => {
                    const intensity = 0.6 + Math.sin(Date.now() * 0.005 + pt.x) * 0.4;
                    const alpha = Math.min(0.95, 0.6 + intensity*0.3);
                    sCtx.beginPath();
                    sCtx.arc(pt.x, pt.y, pt.size * (0.8 + Math.sin(Date.now()*0.004 + pt.y)*0.2), 0, Math.PI*2);
                    sCtx.fillStyle = `rgba(255, 225, 180, ${alpha})`;
                    sCtx.fill();
                    sCtx.shadowBlur = 8;
                    sCtx.shadowColor = "#ffccaa";
                });
                starAnimId = requestAnimationFrame(twinkleStars);
            }
            if(starAnimId) cancelAnimationFrame(starAnimId);
            twinkleStars();
        }
        
        // soft notification sound (optional but subtle)
        function initSoundContext() {
            if(soundCtx) return;
            soundCtx = new (window.AudioContext || window.webkitAudioContext)();
            soundCtx.resume();
        }
        function playMessagePing() {
            if(!soundCtx) return;
            try {
                const osc = soundCtx.createOscillator();
                const gain = soundCtx.createGain();
                osc.connect(gain);
                gain.connect(soundCtx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.08;
                osc.type = 'sine';
                gain.gain.exponentialRampToValueAtTime(0.00001, soundCtx.currentTime + 0.5);
                osc.start();
                osc.stop(soundCtx.currentTime + 0.2);
            } catch(e) {}
        }
        
        // unlock transition
        function unlockApp() {
            if(isUnlocked) return;
            isUnlocked = true;
            gate.style.transition = "opacity 1s ease, transform 1s ease";
            gate.style.opacity = "0";
            gate.style.transform = "scale(1.04)";
            setTimeout(() => { gate.style.display = "none"; }, 1200);
            expContainer.classList.add('active');
            
            // soft piano background starts
            if(!musicStarted) {
                audioPlayer = new Audio('https://cdn.pixabay.com/download/audio/2022/05/27/audio_6aefc7e5b4.mp3?filename=gentle-piano-loop-107374.mp3');
                audioPlayer.loop = true;
                audioPlayer.volume = 0.12;
                audioPlayer.play().catch(e=>console.log("autoplay blocked, but bg later"));
                musicStarted = true;
            }
            // subtle light glow: add overlay glow
            const glowDiv = document.createElement('div');
            glowDiv.style.position = 'fixed';
            glowDiv.style.top = '0';
            glowDiv.style.left = '0';
            glowDiv.style.width = '100%';
            glowDiv.style.height = '100%';
            glowDiv.style.background = 'radial-gradient(circle at center, rgba(255,210,180,0.12) 0%, transparent 70%)';
            glowDiv.style.pointerEvents = 'none';
            glowDiv.style.zIndex = '8';
            document.body.appendChild(glowDiv);
            setTimeout(() => glowDiv.style.opacity = '0', 1800);
            setTimeout(() => glowDiv.remove(), 3500);
            
            drawAnnaStars(); // Bonus: ANNA in stars
            initSoundContext(); // prepare sound ctx for optional ping
            startStory();
        }
        
        // Story flow manager
        function startStory() {
            // scene 1: typing
            const typingDiv = document.createElement('div');
            typingDiv.className = 'scene-block';
            typingDiv.innerHTML = `<div class="typing-container"><span id="dynamicTyping" class="typed-line"></span><span class="cursor-blink"></span></div>`;
            storyRoot.appendChild(typingDiv);
            const targetSpan = document.getElementById('dynamicTyping');
            const fullPhrases = ["I didn't expect this…", "…but somehow…", "…you became someone I look forward to."];
            let phraseIdx = 0, charIdx = 0, currentHtml = '';
            function typeNext() {
                if(phraseIdx >= fullPhrases.length) {
                    setTimeout(() => startChatScene(), 1100);
                    return;
                }
                let phrase = fullPhrases[phraseIdx];
                if(charIdx === 0) {
                    if(phraseIdx > 0) currentHtml += '<br><br>';
                }
                if(charIdx < phrase.length) {
                    currentHtml += phrase[charIdx];
                    targetSpan.innerHTML = currentHtml;
                    charIdx++;
                    setTimeout(typeNext, 55 + Math.random()*30);
                } else {
                    phraseIdx++;
                    charIdx = 0;
                    setTimeout(typeNext, 650);
                }
            }
            typeNext();
        }
        
        function startChatScene() {
            const chatBlock = document.createElement('div');
            chatBlock.className = 'scene-block';
            chatBlock.innerHTML = `<div class="whatsapp-container" id="whatsappBox"></div>`;
            storyRoot.appendChild(chatBlock);
            const chatBox = document.getElementById('whatsappBox');
            const messages = [
                {text: "We're not even that close…", side: 'left', delay: 500},
                {text: "Still…", side: 'left', delay: 850},
                {text: "Talking to you feels easy", side: 'left', delay: 1000},
                {text: "No pressure… no awkwardness…", side: 'left', delay: 1150},
                {text: "Just… calm", side: 'left', delay: 1100},
                {type: 'typing', delay: 1300},
                {text: "And I don't know why…", side: 'left', delay: 1750},
                {text: "But I started liking that feeling", side: 'left', delay: 1400}
            ];
            let idx = 0;
            function addMessage(msg, side) {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message left`;
                msgDiv.innerText = msg;
                chatBox.appendChild(msgDiv);
                msgDiv.classList.add('vibrate-message');
                setTimeout(()=> msgDiv.classList.remove('vibrate-message'), 250);
                if(soundCtx && soundCtx.state === 'running') playMessagePing();
                chatBox.scrollIntoView({behavior: 'smooth', block: 'nearest'});
            }
            function addTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing-dots';
                typingDiv.id = 'tempTypingInd';
                typingDiv.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
                chatBox.appendChild(typingDiv);
                setTimeout(() => {
                    const el = document.getElementById('tempTypingInd');
                    if(el) el.remove();
                }, 1800);
            }
            function processQueue() {
                if(idx >= messages.length) {
                    setTimeout(() => startInnerFeelings(), 1000);
                    return;
                }
                const item = messages[idx];
                if(item.type === 'typing') {
                    addTypingIndicator();
                    idx++;
                    setTimeout(processQueue, 1800);
                } else {
                    setTimeout(() => {
                        addMessage(item.text, item.side);
                        idx++;
                        processQueue();
                    }, item.delay);
                }
            }
            processQueue();
        }
        
        function startInnerFeelings() {
            const feelBlock = document.createElement('div');
            feelBlock.className = 'scene-block';
            feelBlock.innerHTML = `<div class="cinematic-text" id="cinematicFeel"><div class="feel-line">I’m not trying to rush anything…</div><div class="feel-line">I’m not expecting something big…</div><div class="feel-line">I just…</div><div class="feel-line">…don’t want to lose this.</div><div class="feel-line">Because what we have…</div><div class="feel-line">…feels rare.</div></div>`;
            storyRoot.appendChild(feelBlock);
            const lines = document.querySelectorAll('.feel-line');
            lines.forEach((line, i) => { line.style.animationDelay = `${i * 0.35}s`; });
            // background slightly darkens
            document.body.style.background = "#03050c";
            setTimeout(() => startMasterpiece(), 2800);
        }
        
        function startMasterpiece() {
            const masterBlock = document.createElement('div');
            masterBlock.className = 'scene-block';
            masterBlock.innerHTML = `<div class="masterpiece-area" id="masterpieceZone"></div>`;
            storyRoot.appendChild(masterBlock);
            const masterZone = document.getElementById('masterpieceZone');
            const masterLines = [
                "👉 “I’ll wait…”",
                "👉 “even if it takes a year…”",
                "👉 “until the day…”",
                "👉 “you can say ‘I love you’ to me.”"
            ];
            let lineIdx = 0;
            function showNext() {
                if(lineIdx >= masterLines.length) {
                    setTimeout(() => extraMoment(), 1000);
                    return;
                }
                const lineDiv = document.createElement('div');
                lineDiv.className = 'master-line';
                lineDiv.innerText = masterLines[lineIdx];
                masterZone.appendChild(lineDiv);
                if(lineIdx === masterLines.length-1) {
                    lineDiv.classList.add('heart-glow');
                }
                lineIdx++;
                setTimeout(showNext, 950);
            }
            showNext();
        }
        
        function extraMoment() {
            const extraDiv = document.createElement('div');
            extraDiv.className = 'scene-block';
            extraDiv.innerHTML = `<div class="masterpiece-area" style="background: radial-gradient(ellipse 70% 50% at center, rgba(35,20,60,0.7), transparent);"><div class="master-line" style="animation-delay:0s;">“And even if that day never comes…”</div><div class="master-line" style="animation-delay:0.7s;">“…I’ll still be glad…”</div><div class="master-line" style="animation-delay:1.3s;">“…that I got to know you like this.”</div></div>`;
            storyRoot.appendChild(extraDiv);
            setTimeout(() => softEnding(), 3100);
        }
        
        function softEnding() {
            const endBlock = document.createElement('div');
            endBlock.className = 'scene-block';
            endBlock.innerHTML = `<div class="soft-ending-box"><p>No pressure…</p><p>No expectations…</p><p>Just something real…</p><p>…if it ever happens.</p></div>`;
            storyRoot.appendChild(endBlock);
            // warmer background (slight pink glow)
            document.body.style.transition = "background 1.2s";
            document.body.style.background = "#140f1a";
            const warmGlow = document.createElement('style');
            warmGlow.textContent = `.animated-bg { filter: hue-rotate(12deg) brightness(1.02); }`;
            document.head.appendChild(warmGlow);
            // add final button
            finalBtnZone.innerHTML = `<button id="finalSmileBtn" class="final-button">👉 “Just smile… that’s enough for me 😊”</button>`;
            const smileBtn = document.getElementById('finalSmileBtn');
            smileBtn.addEventListener('click', finalHeartsAndFade);
        }
        
        function finalHeartsAndFade() {
            // floating hearts & sparkles
            for(let i=0;i<44;i++) {
                const heart = document.createElement('div');
                const icons = ['❤️','💖','✨','⭐','💫','🌸'];
                heart.innerHTML = icons[Math.floor(Math.random()*icons.length)];
                heart.style.position = 'fixed';
                heart.style.bottom = '5%';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 28 + 18) + 'px';
                heart.style.pointerEvents = 'none';
                heart.style.zIndex = '999';
                heart.style.animation = `floatUp ${Math.random() * 1.8 + 1.2}s forwards ease-out`;
                document.body.appendChild(heart);
                setTimeout(()=> heart.remove(), 2500);
            }
            const styleAnim = document.createElement('style');
            styleAnim.textContent = `@keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-450px) rotate(12deg); opacity: 0; } }`;
            document.head.appendChild(styleAnim);
            // screen slowly fades out
            const fadeOverlay = document.createElement('div');
            fadeOverlay.style.position = 'fixed';
            fadeOverlay.style.top = 0;
            fadeOverlay.style.left = 0;
            fadeOverlay.style.width = '100%';
            fadeOverlay.style.height = '100%';
            fadeOverlay.style.backgroundColor = '#080411';
            fadeOverlay.style.zIndex = 10000;
            fadeOverlay.style.opacity = 0;
            fadeOverlay.style.transition = 'opacity 2.2s ease';
            fadeOverlay.style.pointerEvents = 'none';
            document.body.appendChild(fadeOverlay);
            setTimeout(() => { fadeOverlay.style.opacity = 1; }, 40);
        }
        
        // Password check
        document.getElementById('unlockButton').addEventListener('click', () => {
            const inputVal = document.getElementById('pwdInput').value;
            if(inputVal === "ANNA") {
                unlockApp();
            } else {
                const inpField = document.getElementById('pwdInput');
                inpField.style.borderColor = "#ffa296";
                setTimeout(() => inpField.style.borderColor = "", 700);
            }
        });
        document.getElementById('pwdInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') document.getElementById('unlockButton').click();
        });
        
        // camera-like slow zoom on body
        document.body.classList.add('camera-zoom');
        // parallax depth: background moves slightly slower on mousemove
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 6;
            const y = (e.clientY / window.innerHeight) * 6;
            document.querySelector('.animated-bg').style.transform = `translate(${x*0.3}px, ${y*0.2}px) scale(1.02)`;
        });
    })();
</script>
</body>
</html>
