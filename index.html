<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* General Reset and Body */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #050510, #1a0b1c, #0a0a2a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden; /* Prevents scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- PASSWORD SCREEN --- */
        #lock-screen {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            transition: opacity 2s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .glass-card h2 {
            font-family: 'Cinzel', serif;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 30px;
            color: #f8e5e5;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-transform: none;
        }

        input:focus {
            border-color: #ff9a9e;
            box-shadow: 0 0 15px rgba(255, 154, 158, 0.3);
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #ff9a9e;
            color: #ff9a9e;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.4s;
        }

        button:hover {
            background: #ff9a9e;
            color: #1a0b1c;
            box-shadow: 0 0 20px rgba(255, 154, 158, 0.5);
        }

        .error-msg {
            margin-top: 15px;
            color: #ff4d4d;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* --- MAIN EXPERIENCE (BOUQUET & MESSAGE) --- */
        #main-site {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; /* Hidden until unlocked */
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 3s ease-in;
            text-align: center;
            padding: 20px;
        }

        .content-container {
            z-index: 10;
            position: relative;
        }

        /* The glowing flower/centerpiece */
        .glowing-flower {
            font-size: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 154, 158, 0.8));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* The Main Super Decorated Sentence */
        .core-message {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #ffe6e6;
            line-height: 1.4;
            max-width: 800px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3), 
                         0 0 20px rgba(255, 154, 158, 0.6), 
                         0 0 40px rgba(255, 154, 158, 0.4);
        }

        /* Mobile responsiveness for the text */
        @media (max-width: 600px) {
            .core-message {
                font-size: 2.2rem;
            }
        }

        /* Word-by-word fade animation classes */
        .word {
            opacity: 0;
            display: inline-block;
            transform: translateY(20px);
            animation: fadeWordUp 1.5s forwards ease-out;
        }

        @keyframes fadeWordUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Falling Petals & Dust Particles */
        .particle {
            position: absolute;
            top: -10%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="glass-card" id="card">
            <h2>Secret Name</h2>
            <input type="password" id="pass-input" placeholder="Who holds the key?">
            <button onclick="checkPassword()">Unlock</button>
            <p id="error-msg" class="error-msg">Only she holds the key.</p>
        </div>
    </div>

    <div id="main-site">
        <div class="content-container">
            <div class="glowing-flower">✨🌸✨</div>
            <h1 class="core-message" id="message">I will wait if it takes a year until the day you can say I love you to me.</h1>
        </div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById("pass-input").value.trim().toUpperCase();
            const errorMsg = document.getElementById("error-msg");
            const card = document.getElementById("card");
            const lockScreen = document.getElementById("lock-screen");
            const mainSite = document.getElementById("main-site");

            if (input === "ANNA") {
                // Correct Password
                errorMsg.style.opacity = "0";
                
                // Fade out lock screen
                lockScreen.style.opacity = "0";
                
                setTimeout(() => {
                    lockScreen.style.display = "none";
                    mainSite.style.display = "flex";
                    
                    // Small delay before fading in the main site for dramatic effect
                    setTimeout(() => {
                        mainSite.style.opacity = "1";
                        animateText();
                        createParticles();
                    }, 500);

                }, 2000); // Wait for fade out
            } else {
                // Wrong Password
                errorMsg.style.opacity = "1";
                card.classList.remove("shake");
                void card.offsetWidth; // Trigger reflow to restart animation
                card.classList.add("shake");
                document.getElementById("pass-input").value = "";
            }
        }

        // Allow pressing "Enter" key on keyboard
        document.getElementById("pass-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });

        // Break the sentence into spans to animate word by word slowly
        function animateText() {
            const msgElement = document.getElementById("message");
            const text = msgElement.innerText;
            const words = text.split(" ");
            msgElement.innerHTML = ""; // clear original text

            words.forEach((word, index) => {
                let span = document.createElement("span");
                span.classList.add("word");
                span.innerText = word + " ";
                // Delay each word by 0.6 seconds to make it emotional and slow
                span.style.animationDelay = `${index * 0.6}s`;
                msgElement.appendChild(span);
            });
        }

        // Generate glowing dust and falling petals in the background
        function createParticles() {
            const symbols = ["🌸", "✨", "💫", "🤍"];
            setInterval(() => {
                const particle = document.createElement("div");
                particle.classList.add("particle");
                
                // Randomize symbol
                particle.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Randomize size
                const size = Math.random() * 15 + 10;
                particle.style.fontSize = `${size}px`;
                
                // Randomize starting X position
                particle.style.left = `${Math.random() * 100}vw`;
                
                // Randomize fall duration (between 10s and 20s)
                const duration = Math.random() * 10 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                document.getElementById("main-site").appendChild(particle);
                
                // Remove particle after it falls to prevent lag
                setTimeout(() => {
                    particle.remove();
                }, duration * 1000);
            }, 400); // Generate a new particle every 400ms
        }
    </script>
</body>
</html>
